<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerreStock Pro</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 0;
  }
  .page { display: none; }
  .page.active { display: block; }
  h1 { text-align: center; color: #0055cc; margin:0; }
  h2 { color: #0055cc; border-bottom: 2px solid #0055cc; padding-bottom: 5px; }
  button {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-blue { background-color: #0055cc; color: white; }
  .btn-green { background-color: #00aa44; color: white; }
  .btn-red { background-color: #cc2222; color: white; }
  .btn-orange { background-color: #cc6600; color: white; }
  .btn-user {
    background-color: #f0f0f0;
    color: #000;
    text-align: left;
    border: 1px solid #ccc;
  }
  input {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
  }
  .card {
    background-color: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
  }
  .kpi {
    display: inline-block;
    background-color: #e8f0ff;
    border-radius: 8px;
    padding: 10px 20px;
    margin: 5px;
    font-size: 18px;
    font-weight: bold;
    color: #0055cc;
  }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: white;
    padding: 20px;
    overflow-y: auto;
    z-index: 999;
  }
  /* BARRE DE NAVIGATION EN HAUT */
  .topnav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background-color: #0055cc;
    display: flex;
    align-items: center;
    padding: 6px 8px;
    gap: 4px;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .topnav .nav-left {
    display: flex;
    gap: 4px;
    flex: 1;
    flex-wrap: wrap;
  }
  .topnav .nav-right {
    margin-left: 10px;
    border-left: 2px solid rgba(255,255,255,0.3);
    padding-left: 10px;
  }
  .topnav button {
    margin: 0;
    padding: 8px 10px;
    font-size: 11px;
    width: auto;
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .topnav button:active { background: rgba(255,255,255,0.3); }
  .topnav .btn-nueva {
    background-color: #00aa44;
    border-color: #00aa44;
    font-size: 12px;
    padding: 8px 12px;
  }
  /* Contenu principal avec marge pour la topnav */
  .app-content {
    padding: 70px 16px 20px 16px;
  }
  .pindot {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    background-color: #ccc;
    margin: 0 5px;
  }
  .pindot.filled { background-color: #0055cc; }
  .pinkey {
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    color: #0055cc;
    font-size: 20px;
    font-weight: bold;
    padding: 18px;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="page active" id="login" style="padding:20px;">
  <h1 style="margin-top:40px;">🪟 VerreStock Pro</h1>
  <p style="text-align:center; color:#888;">Seleccione su perfil</p>

  <div id="userList"></div>

  <div id="pinScreen" style="display:none; text-align:center;">
    <h2 id="pinUserName" style="border:none;"></h2>
    <div id="pinDots" style="margin:20px 0;"></div>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto;" id="pinKeys"></div>
    <p style="color:#999; font-size:12px; margin-top:20px;">PIN: HAMZA=1234, TAFAT=5678, LUIS=0000</p>
    <button class="btn-red" style="max-width:280px; margin:20px auto;" onclick="backToUsers()">← Volver</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div class="page" id="app">

  <!-- BARRE DE NAVIGATION EN HAUT -->
  <div class="topnav">
    <div class="nav-left">
      <button onclick="goto('entrees')">📥 Entradas</button>
      <button onclick="goto('sorties')">📤 Salidas</button>
      <button onclick="goto('casse')" style="background:#cc2222; border-color:#cc2222;">💥 Roturas</button>
      <button onclick="goto('stock')">🪟 Stock</button>
      <button onclick="goto('historique')" style="background:#6633aa; border-color:#6633aa;">🕓 Historial</button>
    </div>
    <div class="nav-right">
      <button class="btn-nueva" onclick="openModal('modalRec')">+ Nueva Recepción</button>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="app-content">
    <!-- INFO USUARIO -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <p style="color:#888; margin:0;" id="userInfo"></p>
      <button class="btn-red" style="width:auto; padding:6px 14px; font-size:13px;" onclick="logout()">Salir</button>
    </div>

    <!-- ENTRADAS -->
    <div class="page active" id="page-entrees">
      <h2>📥 Flux de Entradas</h2>
      <div id="entreeList"></div>
    </div>

    <!-- ROTURAS -->
    <div class="page" id="page-casse">
      <h2>💥 Roturas</h2>
      <button class="btn-red" onclick="openModal('modalCasse')">Declarar una Rotura</button>
      <div id="casseList"></div>
    </div>

    <!-- SALIDAS -->
    <div class="page" id="page-sorties">
      <h2>📤 Salidas</h2>
      <button class="btn-orange" onclick="openModal('modalSortie')">+ Nueva Salida</button>
      <div id="sortieList"></div>
    </div>

    <!-- STOCK -->
    <div class="page" id="page-stock">
      <h2>🪟 Stock Global</h2>
      <button class="btn-blue" style="background:#6633aa" onclick="goto('historique')">🕓 Ver historial de un contenedor</button>
      <div id="stockKpis"></div>
      <div id="stockTableWrap" style="margin:12px 0; overflow-x:auto;"></div>
      <div id="stockList"></div>
    </div>

    <!-- MODAL DÉTAIL RÉFÉRENCE -->
    <div class="modal" id="modalProdDetail">
      <h2 id="prodDetailTitle">📦 Detalle</h2>
      <div id="prodDetailList"></div>
      <button class="btn-blue" onclick="closeModal('modalProdDetail')">Cerrar</button>
    </div>

    <!-- HISTORIAL -->
    <div class="page" id="page-historique">
      <h2>🕓 Historial de Movimientos</h2>
      <label>N° Contenedor</label>
      <div style="display:flex; gap:8px">
        <input type="text" id="histNum" placeholder="ej: 22325100518C" style="flex:1" oninput="renderHistorique()">
        <button onclick="openScanner('histNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
      </div>
      <div id="histList"></div>
    </div>

  </div><!-- fin app-content -->
</div><!-- fin app -->

<!-- ═══ MODAL SORTIE ═══ -->
<div class="modal" id="modalSortie">
  <h2>📤 Nueva Salida</h2>
  <label>N° Contenedor</label>
  <div style="display:flex; gap:8px">
    <input type="text" id="sortieNum" placeholder="ej: 22325100518C" style="flex:1">
    <button onclick="openScanner('sortieNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
  </div>

  <label>Clientee (opcional)</label>
  <input type="text" id="sortieCliente" placeholder="ej: Empresa ABC">

  <button class="btn-green" onclick="saveSortie()">✓ Confirmar salida</button>
  <button class="btn-red" onclick="closeModal('modalSortie')">Cancelar</button>
</div>

<!-- ═══ MODAL RECEPCIÓN ═══ -->
<div class="modal" id="modalRec">
  <h2>📥 Nueva Recepción</h2>

  <button class="btn-blue" onclick="openScanner(['recProd','recNum'])" style="background:#0088ff">📷 Escanear etiqueta (producto + contenedor)</button>

  <label>Producto (código)</label>
  <input type="text" id="recProd" placeholder="ej: FLT8-321/214" list="prodList" oninput="onProdChange()">
  <datalist id="prodList"></datalist>

  <label>Hojas por caja <span id="fpcStatus" style="font-size:12px; font-weight:normal;"></span></label>
  <input type="number" id="recFpc" min="1" placeholder="ej: 16">

  <label>Número de cajas</label>
  <input type="number" id="recNb" value="1" min="1">

  <label>N° Contenedor</label>
  <div style="display:flex; gap:8px">
    <input type="text" id="recNum" placeholder="ej: 22325100518C" style="flex:1">
    <button onclick="openScanner('recNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
  </div>

  <label>Ubicación (opcional)</label>
  <input type="text" id="recEmp" placeholder="ej: A1,3">

  <button class="btn-green" onclick="saveRec()">✓ Confirmar</button>
  <button class="btn-red" onclick="closeModal('modalRec')">Cancelar</button>
</div>

<!-- ═══ MODAL ROTURA ═══ -->
<div class="modal" id="modalCasse">
  <h2>💥 Declaración de Rotura</h2>
  <label>N° Contenedor</label>
  <div style="display:flex; gap:8px">
    <input type="text" id="casseNum" placeholder="ej: 22325100518C" style="flex:1">
    <button onclick="openScanner('casseNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
  </div>

  <label>Número de hojas rotas</label>
  <input type="number" id="casseQty" value="1" min="1">

  <button class="btn-red" onclick="saveCasse()">💥 Validar</button>
  <button class="btn-blue" onclick="closeModal('modalCasse')">Cancelar</button>
</div>

<!-- ═══ MODAL ESCÁNER ═══ -->
<div class="modal" id="modalScanner" style="background:#000; padding:0">
  <div style="position:relative; width:100%; height:100vh; display:flex; flex-direction:column">
    <div style="background:#111; color:#fff; padding:14px; display:flex; justify-content:space-between; align-items:center">
      <span style="font-weight:bold; font-size:16px">📷 Escáner</span>
      <button onclick="closeScanner()" style="background:#cc2222; color:#fff; border:none; border-radius:6px; padding:8px 14px; font-weight:bold">✕ Cerrar</button>
    </div>
    <video id="scanVideo" autoplay playsinline muted style="width:100%; flex:1; object-fit:cover; background:#000"></video>
    <canvas id="scanCanvas" style="display:none"></canvas>
    <div id="scanStatusMsg" style="color:#fff; text-align:center; padding:14px; background:#111; font-size:14px"></div>
    <div style="background:#111; padding:14px">
      <input type="text" id="scanManualInp" placeholder="O escriba el código aquí..." style="width:100%; padding:12px; border-radius:8px; border:none; font-size:16px; box-sizing:border-box; margin-bottom:8px">
      <button onclick="validateManualScan()" style="width:100%; padding:14px; background:#00aa44; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:15px">✓ Validar este código</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════════════════
const USERS = [
  {id:'u1', nom:'HAMZA MAROC', role:'Operador', pin:'1234'},
  {id:'u2', nom:'TAFAT KHALED', role:'Operador', pin:'5678'},
  {id:'u3', nom:'LUIS MIGUEL SOLERA', role:'Magasinero', pin:'0000'},
];

// Table précise : hojas par caja selon la référence EXACTE (épaisseur + dimensions)
// Clé = "épaisseur-dimensions" tel qu'extrait du code produit (ex: "8-321/214")
// Complétée automatiquement quand l'utilisateur saisit une quantité pour une nouvelle référence.
const FPC_TABLE_DEFAULT = {
  // FLOAT incolore (FL, FLT)
  '4-366/214': 34,
  '4-321/214': 32,
  '8-321/214': 16,
  '10-300/200': 13,
  '10-321/214': 13,
  '10-225/214': 13,
  '12-300/200': 11,
  '12-321/214': 11,
  '12-225/214': 11,
  // FLOAT SuperClear (M)
  '8M-321/200': 16,
  '4M-321/255': 28,
  // PARSOL GRIS (GR)
  '4GR-330/225': 29,
  '5GR-330/225': 23,
  // PARSOL BRONCE (BR)
  '4BR-321/225': 29,
  '6BR-321/225': 19,
  // CARGLASS (CG, sans suffixe)
  '4-250/200': 43,
  // FLOAT TREMPÉ avec trous (TR + nb trous + T)
  '12TR6T-299/199': 18,
  '12TR8T-299/199': 18,
};
let FPC_TABLE = Object.assign({}, FPC_TABLE_DEFAULT, JSON.parse(localStorage.getItem('vs_fpc_table') || '{}'));

function saveFpcTable() {
  localStorage.setItem('vs_fpc_table', JSON.stringify(FPC_TABLE));
}

// Extrait {ep, dims, key} d'un code produit de tout format :
// FL8-321/214, FLT4-366/214, FL4GR-330/225, FL6BR-321/225, FL8M-321/200,
// CG4-250/200, FL12TR6T-299/199, FL4M-321/255...
// La clé inclut tout suffixe après les chiffres d'épaisseur (TR6T, M, GR, BR...)
// pour distinguer des variantes qui ont la même épaisseur/dimensions mais des
// caractéristiques différentes (ex: nombre de trous de perçage, type de verre).
function parseProductCode(prod) {
  const m = prod.match(/^([A-Z]+)(\d+)([A-Z0-9]*)-(\d+\/\d+)$/i);
  if (!m) return null;
  const ep = parseInt(m[2]);
  const suffix = m[3] || '';
  const dims = m[4];
  return { ep, dims, key: m[2] + suffix + '-' + dims };
}

// Dimensions réelles connues (hauteur/largeur, format des étiquettes)
const DIMS = ['199/299','225/214','250/200','255/321','300/200','321/200','321/214','321/225','330/214','330/225','366/214'];
const EPS = [3,4,5,6,8,10,12];

const PRODS = [];
EPS.forEach(ep => DIMS.forEach(d => PRODS.push('FLT'+ep+'-'+d)));

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let DB = {
  stock: JSON.parse(localStorage.getItem('vs_stock') || '{}'),
  entrees: JSON.parse(localStorage.getItem('vs_entrees') || '[]'),
  casses: JSON.parse(localStorage.getItem('vs_casses') || '[]'),
  sorties: JSON.parse(localStorage.getItem('vs_sorties') || '[]'),
  mouvements: JSON.parse(localStorage.getItem('vs_mouvements') || '[]'),
};

let currentUser = null;
let selectedPinUser = null;
let pinValue = '';

// URL du Google Apps Script de synchronisation
const SYNC_URL = 'https://script.google.com/macros/s/AKfycbwva6-Ugbh9icmKJOZVg5Dyj3NPgC0-Px-m0VO9lOW1E9Kd3r6p_CyZ77JY6pUUJmyJ/exec';

function saveDB() {
  localStorage.setItem('vs_stock', JSON.stringify(DB.stock));
  localStorage.setItem('vs_entrees', JSON.stringify(DB.entrees));
  localStorage.setItem('vs_casses', JSON.stringify(DB.casses));
  localStorage.setItem('vs_sorties', JSON.stringify(DB.sorties));
  localStorage.setItem('vs_mouvements', JSON.stringify(DB.mouvements));
  syncToSheets();
}

let syncTimer = null;
function syncToSheets() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => {
    const payload = {
      stock: DB.stock,
      entrees: DB.entrees,
      casses: DB.casses,
      sorties: DB.sorties,
      mouvements: DB.mouvements,
      fpcTable: FPC_TABLE,
      updatedAt: new Date().toISOString()
    };
    fetch(SYNC_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    }).catch(e => console.warn('Sync Sheets echouee:', e));
  }, 500);
}

function loadFromSheets() {
  fetch(SYNC_URL + '?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (!data || !data.entrees) return;
      DB.stock = data.stock || {};
      DB.entrees = data.entrees || [];
      DB.casses = data.casses || [];
      DB.sorties = data.sorties || [];
      DB.mouvements = data.mouvements || [];
      if (data.fpcTable) FPC_TABLE = Object.assign({}, FPC_TABLE_DEFAULT, data.fpcTable);
      localStorage.setItem('vs_stock', JSON.stringify(DB.stock));
      localStorage.setItem('vs_entrees', JSON.stringify(DB.entrees));
      localStorage.setItem('vs_casses', JSON.stringify(DB.casses));
      localStorage.setItem('vs_sorties', JSON.stringify(DB.sorties));
      localStorage.setItem('vs_mouvements', JSON.stringify(DB.mouvements));
      if (currentUser) {
        const activePage = document.querySelector('#app .page.active');
        if (activePage) {
          const id = activePage.id.replace('page-', '');
          if (id === 'entrees') renderEntrees();
          else if (id === 'casse') renderCasse();
          else if (id === 'sorties') renderSorties();
          else if (id === 'stock') renderStock();
          else if (id === 'historique') renderHistorique();
        }
      }
    })
    .catch(e => console.warn('Chargement Sheets echoue:', e));
}

// Charge les données au démarrage puis toutes les 30 secondes
loadFromSheets();
setInterval(loadFromSheets, 30000);

// Journal centralisé : enregistre TOUTE opération liée a un contenant.
// type: 'Entrée' | 'Casse' | 'Sortie' | 'Suppression' | 'Transfert' (futur)
function logMouvement(type, num, detail) {
  DB.mouvements.push({
    type, num, detail,
    operateur: currentUser ? currentUser.nom : '—',
    date: new Date().toISOString()
  });
}

// ═══════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════
function renderUserList() {
  let html = '';
  USERS.forEach(u => {
    html += '<button class="btn-user" onclick=\'selectUser("' + u.id + '")\'>' +
            '<strong>' + u.nom + '</strong><br>' +
            '<span style="color:#888; font-size:12px;">' + u.role + '</span>' +
            '</button>';
  });
  document.getElementById('userList').innerHTML = html;
}

function selectUser(id) {
  selectedPinUser = USERS.find(u => u.id === id);
  pinValue = '';
  document.getElementById('userList').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'block';
  document.getElementById('pinUserName').textContent = selectedPinUser.nom;
  renderPinDots();
  renderPinKeys();
}

function backToUsers() {
  document.getElementById('userList').style.display = 'block';
  document.getElementById('pinScreen').style.display = 'none';
  selectedPinUser = null;
  pinValue = '';
}

function renderPinDots() {
  let html = '';
  for (let i = 0; i < 4; i++) {
    html += '<span class="pindot ' + (pinValue.length > i ? 'filled' : '') + '"></span>';
  }
  document.getElementById('pinDots').innerHTML = html;
}

function renderPinKeys() {
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  let html = '';
  keys.forEach(k => {
    if (k === '') {
      html += '<div></div>';
    } else if (k === '⌫') {
      html += '<button class="pinkey" style="color:#cc2222;" onclick="pinDelete()">⌫</button>';
    } else {
      html += '<button class="pinkey" onclick=\'pinPress("' + k + '")\'>' + k + '</button>';
    }
  });
  document.getElementById('pinKeys').innerHTML = html;
}

function pinPress(k) {
  if (pinValue.length >= 4) return;
  pinValue += k;
  renderPinDots();
  if (pinValue.length === 4) {
    if (selectedPinUser.pin === pinValue) {
      loginSuccess(selectedPinUser);
    } else {
      setTimeout(() => {
        alert('PIN incorrect');
        pinValue = '';
        renderPinDots();
      }, 100);
    }
  }
}

function pinDelete() {
  pinValue = pinValue.slice(0, -1);
  renderPinDots();
}

function loginSuccess(user) {
  currentUser = user;
  document.getElementById('login').classList.remove('active');
  document.getElementById('app').classList.add('active');
  document.getElementById('userInfo').textContent = user.nom + ' · ' + user.role;
  goto('entrees');
}

function logout() {
  currentUser = null;
  selectedPinUser = null;
  pinValue = '';
  document.getElementById('app').classList.remove('active');
  document.getElementById('login').classList.add('active');
  document.getElementById('userList').style.display = 'block';
  document.getElementById('pinScreen').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function goto(page) {
  document.querySelectorAll('#app .page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (page === 'entrees') renderEntrees();
  else if (page === 'casse') renderCasse();
  else if (page === 'sorties') renderSorties();
  else if (page === 'stock') renderStock();
  else if (page === 'historique') renderHistorique();
}

function openModal(id) {
  document.getElementById(id).style.display = 'block';
  if (id === 'modalRec') {
    let opts = '';
    PRODS.forEach(p => opts += '<option value="' + p + '">');
    document.getElementById('prodList').innerHTML = opts;
    document.getElementById('recFpc').value = '';
    document.getElementById('fpcStatus').textContent = '';
  }
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// Quand le code produit change (saisie ou scan), on regarde si la référence est connue
function onProdChange() {
  const fpcInput = document.getElementById('recFpc');
  const statusEl = document.getElementById('fpcStatus');
  if (!fpcInput || !statusEl) return; // sécurité : éléments pas présents (mauvais contexte)

  const prodEl = document.getElementById('recProd');
  const prod = prodEl ? prodEl.value.trim() : '';
  const parsed = parseProductCode(prod);

  if (!parsed) {
    statusEl.textContent = '';
    return;
  }

  if (FPC_TABLE[parsed.key] !== undefined) {

function saveRec() {
  const prod = document.getElementById('recProd').value.trim();
  const nb = parseInt(document.getElementById('recNb').value) || 1;
  const num = document.getElementById('recNum').value.trim();
  const emp = document.getElementById('recEmp').value.trim();
  const fpcSaisi = parseInt(document.getElementById('recFpc').value);

  if (!prod || !num) {
    alert('Por favor complete el producto y el N° de contenedor');
    return;
  }

  if (!fpcSaisi || fpcSaisi <= 0) {
    alert('⚠️ Por favor indique el número de hojas por caja (visible en la etiqueta: CANTIDAD)');
    return;
  }

  // ANTI-DOUBLON : vérifier si ce N° contenant est déja en stock (reçu et pas encore sorti)
  const dejaRecu = DB.entrees.some(e => e.num === num);
  const dejaSorti = DB.sorties.some(s => s.num === num);
  const isGestionnaire = currentUser && currentUser.role === 'Magasinero';

  if (dejaRecu && !dejaSorti) {
    alert('⛔ El N° de contenedor (' + num + ') ya está registrado en stock.\nNo se puede escanear dos veces.');
    return;
  }

  if (dejaSorti && !isGestionnaire) {
    alert('⛔ El N° de contenedor (' + num + ') ya fue RETIRADO del stock.\n' +
          'Una nueva recepción con este número es imposible.\n' +
          'Solo el Magasinero puede autorizar esta operación.');
    return;
  }

  // Mémoriser cette référence (épaisseur+dimensions) pour la prochaine fois
  const parsed = parseProductCode(prod);
  if (parsed && FPC_TABLE[parsed.key] !== fpcSaisi) {
    FPC_TABLE[parsed.key] = fpcSaisi;
    saveFpcTable();
  }

  const hojas = fpcSaisi * nb;

  DB.entrees.push({ prod, nb, num, emp, hojas, date: new Date().toISOString() });
  logMouvement('Entrée', num, prod + ' · ' + nb + ' caja(s) · ' + hojas + ' hojas' + (emp ? ' · 📍' + emp : ''));

  if (!DB.stock[prod]) DB.stock[prod] = { f: 0, c: 0 };
  DB.stock[prod].f += hojas;
  DB.stock[prod].c += nb;

  saveDB();
  closeModal('modalRec');

  document.getElementById('recProd').value = '';
  document.getElementById('recFpc').value = '';
  document.getElementById('recNb').value = '1';
  document.getElementById('recNum').value = '';
  document.getElementById('recEmp').value = '';

  renderEntrees();
  alert('✓ Recepción registrada : ' + hojas + ' hojas');
}

function saveCasse() {
  const num = document.getElementById('casseNum').value.trim();
  const qty = parseInt(document.getElementById('casseQty').value) || 1;

  if (!num) {
    alert('Por favor ingrese el N° de contenedor');
    return;
  }

  // Retrouve le produit associé a ce contenant pour décrémenter le stock global
  const entry = DB.entrees.slice().reverse().find(e => e.num === num);
  const prodLabel = entry ? entry.prod : '(produit inconnu)';

  // Calcule les hojas restantes AVANT de décrémenter
  const casseAvant = DB.casses.filter(c => c.num === num).reduce((s, c) => s + c.qty, 0);
  const hojasInit = entry ? entry.hojas : 0;
  const hojasRestantes = Math.max(0, hojasInit - casseAvant - qty);

  if (entry && DB.stock[entry.prod]) {
    DB.stock[entry.prod].f = Math.max(0, DB.stock[entry.prod].f - qty);
  }

  DB.casses.push({ num, qty, date: new Date().toISOString() });
  logMouvement('Casse', num, '-' + qty + ' hojas rotas · reste ' + hojasRestantes);
  saveDB();
  closeModal('modalCasse');

  document.getElementById('casseNum').value = '';
  document.getElementById('casseQty').value = '1';

  renderCasse();

  alert('💥 Rotura declarada : -' + qty + ' hojas.\nHojas restantes : ' + hojasRestantes + '\nAbriendo su app de correo...');

  setTimeout(() => {
    envoyerEmailCasse(prodLabel, num, qty, hojasRestantes);
  }, 300);
}

// Retourne la liste des contenants encore actifs (reçus, pas sortis, pas cassés en totalité) pour un produit donné
// Retourne les contenants actifs (reçus, pas sortis) pour un produit, avec leur
// quantité de hojas RESTANTE (= reçu - cassé), pas la quantité initiale.
function getContenantsActifs(prod) {
  return DB.entrees
    .filter(e => e.prod === prod)
    .filter(e => !DB.sorties.some(s => s.num === e.num)) // exclut ceux déja sortis
    .map(e => {
      const casseTotal = DB.casses
        .filter(c => c.num === e.num)
        .reduce((sum, c) => sum + c.qty, 0);
      return Object.assign({}, e, { hojas: Math.max(0, e.hojas - casseTotal) });
    });
}

// Réservé au Gestionnaire : retire UN contenant précis du stock (plus ciblé que removeProductFromStock)
function removeContenantFromStock(prod, num) {
  if (!currentUser || currentUser.role !== 'Magasinero') {
    alert('⛔ Acción reservada al Magasinero.');
    return;
  }
  const entry = DB.entrees.find(e => e.prod === prod && e.num === num);
  if (!entry || !DB.stock[prod]) return;

  if (!confirm('⚠️ Retirer DÉFINITIVEMENT le contenant ' + num + ' (' + entry.hojas + ' hojas) du stock ?\nCette action est irreversible.')) return;

  DB.stock[prod].f -= entry.hojas;
  DB.stock[prod].c -= entry.nb;
  if (DB.stock[prod].f <= 0) delete DB.stock[prod];

  logMouvement('Suppression', num, prod + ' · retirado del stock por el Magasinero');

  saveDB();
  renderStock();
  alert('✓ Contenant ' + num + ' retiré du stock.');
}

// Réservé au Gestionnaire : supprime totalement un produit du stock (sans création de sortie/vente).
function removeProductFromStock(prod) {
  if (!currentUser || currentUser.role !== 'Magasinero') {
    alert('⛔ Acción reservada al Magasinero.');
    return;
  }
  if (!DB.stock[prod]) return;

  const confirmMsg = '⚠️ Retirer DÉFINITIVEMENT "' + prod + '" du stock ?\n' +
    DB.stock[prod].f + ' hojas / ' + DB.stock[prod].c + ' cajas seront supprimées.\n' +
    'Cette action est irreversible.';
  if (!confirm(confirmMsg)) return;

  delete DB.stock[prod];

  // On loggue la suppression pour chaque contenant encore actif lié a ce produit,
  // pour que l'historique par N° contenant reste cohérent.
  getContenantsActifs(prod).forEach(c => {
    logMouvement('Suppression', c.num, prod + ' · retirado del stock por el Magasinero');
  });

  saveDB();
  renderStock();
  alert('✓ "' + prod + '" ha sido retirado del stock.');
}

// ═══════════════════════════════════════════════════════════
// SCANNER CAMÉRA — BarcodeDetector (HTTPS requis)
// ═══════════════════════════════════════════════════════════
let scanStream = null;
let scanDetector = null;
let scanRunning = false;
let scanRaf = null;
let scanTargetQueue = [];
let scanFoundCodes = {}; // codes déja capturés dans cette session { code: true }
let scanCooldownUntil = 0;
let scanRejectUntil = 0;
let scanWatchdogTimer = null;
let scanLastTickAt = 0;

const FIELD_LABELS = {
  recProd: 'PRODUIT',
  recNum: 'N° CONTENANT',
  casseNum: 'N° contenedor',
  sortieNum: 'N° contenedor',
  histNum: 'N° contenedor'
};

// Règles strictes de validation selon le champ ciblé
// Producto ex: FL8-321/214  → lettres + chiffres + tiret + slash
// Contenant ex: 22325100518C → exactement 11 chiffres + 1 lettre majuscule
const FIELD_VALIDATORS = {
  recProd:   { regex: /^[A-Z]{1,6}\d{1,3}[A-Z0-9]{0,6}-\d{2,4}\/\d{2,4}$/, msg: 'Formato de producto esperado : FL8-321/214 ou FL4GR-330/225 ou CG4-250/200' },
  recNum:    { regex: /^\d{11}[A-Z]$/, msg: 'Formato de contenedor esperado : 11 chiffres + 1 lettre (ex: 22325100518C)' },
  casseNum:  { regex: /^\d{11}[A-Z]$/, msg: 'Formato de contenedor esperado : 11 chiffres + 1 lettre (ex: 22325100518C)' },
  sortieNum: { regex: /^\d{11}[A-Z]$/, msg: 'Formato de contenedor esperado : 11 chiffres + 1 lettre (ex: 22325100518C)' },
  histNum:   { regex: /^\d{11}[A-Z]$/, msg: 'Formato de contenedor esperado : 11 chiffres + 1 lettre (ex: 22325100518C)' }
};

function openScanner(targetFieldId) {
  scanTargetQueue = Array.isArray(targetFieldId) ? targetFieldId.slice() : [targetFieldId];
  scanFoundCodes = {};
  scanCooldownUntil = 0;
  scanRejectUntil = 0;
  document.getElementById('modalScanner').style.display = 'block';
  document.getElementById('scanManualInp').value = '';
  updateScanStatus();
  startCamera();
  startWatchdog();
}

// Garde-fou : si la boucle de détection ne "tique" plus depuis 3s alors qu'elle devrait,
// on la relance de force. Filet de sécurité ultime contre tout blocage imprévu.
function startWatchdog() {
  stopWatchdog();
  scanLastTickAt = Date.now();
  scanWatchdogTimer = setInterval(() => {
    const modalVisible = document.getElementById('modalScanner').style.display === 'block';
    if (!modalVisible) { stopWatchdog(); return; }
    if (scanRunning && Date.now() - scanLastTickAt > 3000) {
      console.warn('Watchdog: boucle figée, relance forcée');
      detectLoop();
    }
  }, 1000);
}

function stopWatchdog() {
  if (scanWatchdogTimer) { clearInterval(scanWatchdogTimer); scanWatchdogTimer = null; }
}

function updateScanStatus(extra) {
  const statusEl = document.getElementById('scanStatusMsg');
  const next = scanTargetQueue[0];
  let html = '📷 Apunte al código de barras <strong>' + (FIELD_LABELS[next] || 'demandé') + '</strong>';
  if (extra) html = extra + '<br>' + html;
  statusEl.innerHTML = html;
}

async function startCamera() {
  const video = document.getElementById('scanVideo');
  const statusEl = document.getElementById('scanStatusMsg');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 }, focusMode: 'continuous' }
    });
    scanStream = stream;
    video.srcObject = stream;
    await video.play();

    if ('BarcodeDetector' in window) {
      // Uniquement Code 128 et Code 39 (formats réellement utilisés sur ces étiquettes).
      // EAN-13, QR, Data Matrix, etc. sont volontairement exclus pour éviter les faux positifs.
      scanDetector = new BarcodeDetector({
        formats: ['code_128', 'code_39']
      });
      updateScanStatus();
      scanRunning = true;
      detectLoop();
    } else {
      statusEl.textContent = '⚠️ Escáner automático no compatible con este navegador. Escriba el código abajo.';
    }
  } catch (err) {
    let msg = 'Erreur caméra : ' + err.message;
    if (err.name === 'NotAllowedError') msg = '❌ Permiso de cámara denegado. Autorice en la configuración du navigateur.';
    statusEl.textContent = msg;
  }
}

function detectLoop() {
  const video = document.getElementById('scanVideo');
  const canvas = document.getElementById('scanCanvas');

  const tick = async () => {
    scanLastTickAt = Date.now();
    if (!scanRunning) return;
    if (!video.videoWidth) { scanRaf = requestAnimationFrame(tick); return; }

    if (Date.now() < scanRejectUntil) {
      scanRaf = requestAnimationFrame(tick);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    let detectedCodes = [];
    try {
      const codes = await scanDetector.detect(canvas);
      detectedCodes = codes.map(c => c.rawValue.trim());
    } catch(e) { /* erreur de détection caméra : on ignore, on continue la boucle */ }

    if (detectedCodes.length > 0) {
      try {
        handleCodesFound(detectedCodes);
      } catch(e) {
        console.error('Erreur handleCodesFound:', e);
      }
    }
    scanRaf = requestAnimationFrame(tick);
  };
  scanRaf = requestAnimationFrame(tick);
}

// Traite TOUS les codes visibles dans la frame en une fois (pas seulement un par un).
// Cela évite le problème où 2 codes sont visibles simultanément a l'écran mais le
// detector ne "voit" toujours que le même, bloquant la progression vers le 2e champ.
function handleCodesFound(codes) {
  // Essaie d'assigner chaque champ encore en attente a un code qui correspond a sa regex
  // et qui n'a pas déja été utilisé dans cette session.
  for (let i = scanTargetQueue.length - 1; i >= 0; i--) {
    const field = scanTargetQueue[i];
    if (field !== scanTargetQueue[0]) continue; // on ne traite que le champ courant en tête de file, dans l'ordre
    const validator = FIELD_VALIDATORS[field];

    // Cherche parmi les codes visibles celui qui correspond a ce champ et n'a pas déja été pris
    const match = codes.find(code => !scanFoundCodes[code] && (!validator || validator.regex.test(code)));

    if (match) {
      acceptCode(field, match);
      return; // on retraite a la prochaine frame pour le champ suivant
    }
  }

  // Aucun code valide trouvé pour le champ courant : si un code a été vu mais ne correspond
  // a aucune règle attendue, on peut signaler un rejet (seulement si un seul nouveau code visible)
  const field = scanTargetQueue[0];
  const validator = FIELD_VALIDATORS[field];
  const unseenCodes = codes.filter(c => !scanFoundCodes[c]);
  if (unseenCodes.length > 0 && validator) {
    const rejectedCode = unseenCodes[0];
    if (Date.now() >= scanRejectUntil) {
      if (navigator.vibrate) navigator.vibrate(150);
      document.getElementById('scanStatusMsg').innerHTML =
        '⛔ Código no reconocido pour ce champ : "' + rejectedCode + '"<br>' + validator.msg;
      scanRejectUntil = Date.now() + 1200;
    }
  }
}

function acceptCode(field, code) {
  scanFoundCodes[code] = true;
  if (navigator.vibrate) navigator.vibrate([100,50,100]);
  scanTargetQueue.shift();
  document.getElementById(field).value = code;
  if (field === 'recProd') onProdChange();
  if (field === 'histNum') renderHistorique();

  if (scanTargetQueue.length > 0) {
    updateScanStatus('✅ <strong>' + (FIELD_LABELS[field] || '') + '</strong> = ' + code);
  } else {
    document.getElementById('scanStatusMsg').innerHTML = '✅ <strong>' + (FIELD_LABELS[field] || '') + '</strong> = ' + code + '<br>Terminado !';
    scanRunning = false;
    setTimeout(() => { closeScanner(); }, 700);
  }
}

function stopCamera() {
  scanRunning = false;
  if (scanRaf) cancelAnimationFrame(scanRaf);
  if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
    scanStream = null;
  }
  scanDetector = null;
}

function closeScanner() {
  stopCamera();
  stopWatchdog();
  document.getElementById('modalScanner').style.display = 'none';
}

function validateManualScan() {
  const val = document.getElementById('scanManualInp').value.trim();
  if (!val) return;
  scanRunning = false;
  handleCodeFound(val);
}
