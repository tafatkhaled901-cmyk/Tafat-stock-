<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerreStock Pro</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 20px;
  }
  .page { display: none; }
  .page.active { display: block; }
  h1 { text-align: center; color: #0055cc; }
  h2 { color: #0055cc; border-bottom: 2px solid #0055cc; padding-bottom: 5px; }
  button {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-blue { background-color: #0055cc; color: white; }
  .btn-green { background-color: #00aa44; color: white; }
  .btn-red { background-color: #cc2222; color: white; }
  .btn-user {
    background-color: #f0f0f0;
    color: #000;
    text-align: left;
    border: 1px solid #ccc;
  }
  input {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    box-sizing: border-box;
  }
  .card {
    background-color: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
  }
  .kpi {
    display: inline-block;
    background-color: #e8f0ff;
    border-radius: 8px;
    padding: 10px 20px;
    margin: 5px;
    font-size: 18px;
    font-weight: bold;
    color: #0055cc;
  }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: white;
    padding: 20px;
    overflow-y: auto;
    z-index: 999;
  }
  .bottomnav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background-color: white;
    border-top: 1px solid #ccc;
    display: flex;
    padding: 10px;
    gap: 5px;
  }
  .bottomnav button { margin: 0; padding: 8px 1px; font-size: 9px; }
  .pindot {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    background-color: #ccc;
    margin: 0 5px;
  }
  .pindot.filled { background-color: #0055cc; }
  .pinkey {
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    color: #0055cc;
    font-size: 20px;
    font-weight: bold;
    padding: 18px;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="page active" id="login">
  <h1>🪟 VerreStock Pro</h1>
  <p style="text-align:center; color:#888;">Choisissez votre profil</p>

  <div id="userList"></div>

  <div id="pinScreen" style="display:none; text-align:center;">
    <h2 id="pinUserName" style="border:none;"></h2>
    <div id="pinDots" style="margin:20px 0;"></div>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto;" id="pinKeys"></div>
    <p style="color:#999; font-size:12px; margin-top:20px;">PIN démo: Jean=1234, Sophie=5678, Pierre=0000</p>
    <button class="btn-red" style="max-width:280px; margin:20px auto;" onclick="backToUsers()">← Retour</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div class="page" id="app" style="padding-bottom:80px;">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1 style="margin:10px 0;">🪟 VerreStock</h1>
    <button class="btn-red" style="width:auto; padding:8px 16px;" onclick="logout()">Quitter</button>
  </div>
  <p style="color:#888;" id="userInfo"></p>

  <!-- ENTRÉES -->
  <div class="page active" id="page-entrees">
    <h2>📥 Flux Entrées</h2>
    <button class="btn-blue" onclick="openModal('modalRec')">+ Nouvelle Réception</button>
    <div id="entreeList"></div>
  </div>

  <!-- CASSE -->
  <div class="page" id="page-casse">
    <h2>💥 Casse</h2>
    <button class="btn-red" onclick="openModal('modalCasse')">Déclarer une Casse</button>
    <div id="casseList"></div>
  </div>

  <!-- SORTIES -->
  <div class="page" id="page-sorties">
    <h2>📤 Sorties</h2>
    <button class="btn-blue" style="background:#cc6600" onclick="openModal('modalSortie')">+ Nouvelle Sortie</button>
    <div id="sortieList"></div>
  </div>

  <!-- STOCK -->
  <div class="page" id="page-stock">
    <h2>🪟 Stock Global</h2>
    <button class="btn-blue" style="background:#6633aa" onclick="goto('historique')">🕓 Voir l'historique d'un contenant</button>
    <div id="stockKpis"></div>
    <div id="stockList"></div>
  </div>

  <!-- HISTORIQUE -->
  <div class="page" id="page-historique">
    <h2>🕓 Historique des Mouvements</h2>
    <label>N° Contenant</label>
    <div style="display:flex; gap:8px">
      <input type="text" id="histNum" placeholder="ex: 22325100518C" style="flex:1" oninput="renderHistorique()">
      <button onclick="openScanner('histNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
    </div>
    <div id="histList"></div>
  </div>

  <!-- NAV -->
  <div class="bottomnav">
    <button class="btn-blue" onclick="goto('entrees')">📥 Entrées</button>
    <button class="btn-blue" onclick="goto('casse')">💥 Casse</button>
    <button class="btn-blue" style="background:#cc6600" onclick="goto('sorties')">📤 Sorties</button>
    <button class="btn-blue" onclick="goto('stock')">🪟 Stock</button>
    <button class="btn-blue" style="background:#6633aa" onclick="goto('historique')">🕓 Historique</button>
  </div>
</div>

<!-- ═══ MODAL SORTIE ═══ -->
<div class="modal" id="modalSortie">
  <h2>📤 Nouvelle Sortie</h2>
  <label>N° Contenant</label>
  <div style="display:flex; gap:8px">
    <input type="text" id="sortieNum" placeholder="ex: CAI-2024-001" style="flex:1">
    <button onclick="openScanner('sortieNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
  </div>

  <label>Client (optionnel)</label>
  <input type="text" id="sortieClient" placeholder="ex: Société Dupont">

  <button class="btn-green" onclick="saveSortie()">✓ Confirmer la sortie</button>
  <button class="btn-red" onclick="closeModal('modalSortie')">Annuler</button>
</div>

<!-- ═══ MODAL RÉCEPTION ═══ -->
<div class="modal" id="modalRec">
  <h2>📥 Nouvelle Réception</h2>

  <button class="btn-blue" onclick="openScanner(['recProd','recNum'])" style="background:#0088ff">📷 Scanner l'étiquette (produit + contenant)</button>

  <label>Produit (code)</label>
  <input type="text" id="recProd" placeholder="ex: FLT8-321/214" list="prodList" oninput="onProdChange()">
  <datalist id="prodList"></datalist>

  <label>Feuilles par caisse <span id="fpcStatus" style="font-size:12px; font-weight:normal;"></span></label>
  <input type="number" id="recFpc" min="1" placeholder="ex: 16">

  <label>Nombre de caisses</label>
  <input type="number" id="recNb" value="1" min="1">

  <label>N° Contenant</label>
  <div style="display:flex; gap:8px">
    <input type="text" id="recNum" placeholder="ex: 22325100518C" style="flex:1">
    <button onclick="openScanner('recNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
  </div>

  <label>Emplacement (optionnel)</label>
  <input type="text" id="recEmp" placeholder="ex: A1,3">

  <button class="btn-green" onclick="saveRec()">✓ Confirmer</button>
  <button class="btn-red" onclick="closeModal('modalRec')">Annuler</button>
</div>

<!-- ═══ MODAL CASSE ═══ -->
<div class="modal" id="modalCasse">
  <h2>💥 Déclaration de Casse</h2>
  <label>N° Contenant</label>
  <div style="display:flex; gap:8px">
    <input type="text" id="casseNum" placeholder="ex: CAI-2024-001" style="flex:1">
    <button onclick="openScanner('casseNum')" style="width:60px; padding:12px; background:#0088ff; color:#fff; border:none; border-radius:6px; font-size:20px">📷</button>
  </div>

  <label>Nombre de feuilles cassées</label>
  <input type="number" id="casseQty" value="1" min="1">

  <button class="btn-red" onclick="saveCasse()">💥 Valider</button>
  <button class="btn-blue" onclick="closeModal('modalCasse')">Annuler</button>
</div>

<!-- ═══ MODAL SCANNER CAMÉRA ═══ -->
<div class="modal" id="modalScanner" style="background:#000; padding:0">
  <div style="position:relative; width:100%; height:100vh; display:flex; flex-direction:column">
    <div style="background:#111; color:#fff; padding:14px; display:flex; justify-content:space-between; align-items:center">
      <span style="font-weight:bold; font-size:16px">📷 Scanner</span>
      <button onclick="closeScanner()" style="background:#cc2222; color:#fff; border:none; border-radius:6px; padding:8px 14px; font-weight:bold">✕ Fermer</button>
    </div>
    <video id="scanVideo" autoplay playsinline muted style="width:100%; flex:1; object-fit:cover; background:#000"></video>
    <canvas id="scanCanvas" style="display:none"></canvas>
    <div id="scanStatusMsg" style="color:#fff; text-align:center; padding:14px; background:#111; font-size:14px"></div>
    <div style="background:#111; padding:14px">
      <input type="text" id="scanManualInp" placeholder="Ou tapez le code ici..." style="width:100%; padding:12px; border-radius:8px; border:none; font-size:16px; box-sizing:border-box; margin-bottom:8px">
      <button onclick="validateManualScan()" style="width:100%; padding:14px; background:#00aa44; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:15px">✓ Valider ce code</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════════════════
const USERS = [
  {id:'u1', nom:'Jean Dupont', role:'Opérateur', pin:'1234'},
  {id:'u2', nom:'Sophie Martin', role:'Opérateur', pin:'5678'},
  {id:'u3', nom:'Pierre Leroy', role:'Gestionnaire', pin:'0000'},
];

// Table précise : feuilles par caisse selon la référence EXACTE (épaisseur + dimensions)
// Clé = "épaisseur-dimensions" tel qu'extrait du code produit (ex: "8-321/214")
// Complétée automatiquement quand l'utilisateur saisit une quantité pour une nouvelle référence.
const FPC_TABLE_DEFAULT = {
  // FLOAT incolore (FL, FLT, FLM)
  '4-366/214': 34,
  '4-321/214': 32,
  '8-321/214': 16,
  '8-321/200': 16,
  '10-300/200': 13,
  '10-321/214': 13,
  '10-225/214': 13,
  '12-300/200': 11,
  '12-321/214': 11,
  '12-225/214': 11,
  // PARSOL GRIS (FLGR)
  '4-330/225': 29,
  '5-330/225': 23,
  // PARSOL BRONCE (FLBR)
  '4-321/225': 29,
  '6-321/225': 19,
  // CARGLASS (CG)
  '4-250/200': 43,
};
let FPC_TABLE = Object.assign({}, FPC_TABLE_DEFAULT, JSON.parse(localStorage.getItem('vs_fpc_table') || '{}'));

function saveFpcTable() {
  localStorage.setItem('vs_fpc_table', JSON.stringify(FPC_TABLE));
}

// Extrait {ep, dims, key} d'un code produit de tout format :
// FL8-321/214, FLT4-366/214, FL4GR-330/225, FL6BR-321/225, FL8M-321/200, CG4-250/200...
// La clé est toujours "épaisseur-dimensions" pour retrouver dans FPC_TABLE.
function parseProductCode(prod) {
  // On cherche le premier groupe de chiffres (épaisseur) suivi du tiret et des dimensions
  const m = prod.match(/[A-Z]+?(\d+)[A-Z]*-(\d+\/\d+)/i);
  if (!m) return null;
  return { ep: parseInt(m[1]), dims: m[2], key: m[1] + '-' + m[2] };
}

// Dimensions réelles connues (hauteur/largeur, format des étiquettes)
const DIMS = ['225/214','250/200','300/200','321/200','321/214','321/225','330/214','330/225','366/214'];
const EPS = [3,4,5,6,8,10,12];

const PRODS = [];
EPS.forEach(ep => DIMS.forEach(d => PRODS.push('FLT'+ep+'-'+d)));

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let DB = {
  stock: JSON.parse(localStorage.getItem('vs_stock') || '{}'),
  entrees: JSON.parse(localStorage.getItem('vs_entrees') || '[]'),
  casses: JSON.parse(localStorage.getItem('vs_casses') || '[]'),
  sorties: JSON.parse(localStorage.getItem('vs_sorties') || '[]'),
  mouvements: JSON.parse(localStorage.getItem('vs_mouvements') || '[]'),
};

let currentUser = null;
let selectedPinUser = null;
let pinValue = '';

function saveDB() {
  localStorage.setItem('vs_stock', JSON.stringify(DB.stock));
  localStorage.setItem('vs_entrees', JSON.stringify(DB.entrees));
  localStorage.setItem('vs_casses', JSON.stringify(DB.casses));
  localStorage.setItem('vs_sorties', JSON.stringify(DB.sorties));
  localStorage.setItem('vs_mouvements', JSON.stringify(DB.mouvements));
}

// Journal centralisé : enregistre TOUTE opération liée à un contenant.
// type: 'Entrée' | 'Casse' | 'Sortie' | 'Suppression' | 'Transfert' (futur)
function logMouvement(type, num, detail) {
  DB.mouvements.push({
    type, num, detail,
    operateur: currentUser ? currentUser.nom : '—',
    date: new Date().toISOString()
  });
}

// ═══════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════
function renderUserList() {
  let html = '';
  USERS.forEach(u => {
    html += '<button class="btn-user" onclick=\'selectUser("' + u.id + '")\'>' +
            '<strong>' + u.nom + '</strong><br>' +
            '<span style="color:#888; font-size:12px;">' + u.role + '</span>' +
            '</button>';
  });
  document.getElementById('userList').innerHTML = html;
}

function selectUser(id) {
  selectedPinUser = USERS.find(u => u.id === id);
  pinValue = '';
  document.getElementById('userList').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'block';
  document.getElementById('pinUserName').textContent = selectedPinUser.nom;
  renderPinDots();
  renderPinKeys();
}

function backToUsers() {
  document.getElementById('userList').style.display = 'block';
  document.getElementById('pinScreen').style.display = 'none';
  selectedPinUser = null;
  pinValue = '';
}

function renderPinDots() {
  let html = '';
  for (let i = 0; i < 4; i++) {
    html += '<span class="pindot ' + (pinValue.length > i ? 'filled' : '') + '"></span>';
  }
  document.getElementById('pinDots').innerHTML = html;
}

function renderPinKeys() {
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  let html = '';
  keys.forEach(k => {
    if (k === '') {
      html += '<div></div>';
    } else if (k === '⌫') {
      html += '<button class="pinkey" style="color:#cc2222;" onclick="pinDelete()">⌫</button>';
    } else {
      html += '<button class="pinkey" onclick=\'pinPress("' + k + '")\'>' + k + '</button>';
    }
  });
  document.getElementById('pinKeys').innerHTML = html;
}

function pinPress(k) {
  if (pinValue.length >= 4) return;
  pinValue += k;
  renderPinDots();
  if (pinValue.length === 4) {
    if (selectedPinUser.pin === pinValue) {
      loginSuccess(selectedPinUser);
    } else {
      setTimeout(() => {
        alert('PIN incorrect');
        pinValue = '';
        renderPinDots();
      }, 100);
    }
  }
}

function pinDelete() {
  pinValue = pinValue.slice(0, -1);
  renderPinDots();
}

function loginSuccess(user) {
  currentUser = user;
  document.getElementById('login').classList.remove('active');
  document.getElementById('app').classList.add('active');
  document.getElementById('userInfo').textContent = user.nom + ' · ' + user.role;
  goto('entrees');
}

function logout() {
  currentUser = null;
  selectedPinUser = null;
  pinValue = '';
  document.getElementById('app').classList.remove('active');
  document.getElementById('login').classList.add('active');
  document.getElementById('userList').style.display = 'block';
  document.getElementById('pinScreen').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function goto(page) {
  document.querySelectorAll('#app .page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (page === 'entrees') renderEntrees();
  else if (page === 'casse') renderCasse();
  else if (page === 'sorties') renderSorties();
  else if (page === 'stock') renderStock();
  else if (page === 'historique') renderHistorique();
}

function openModal(id) {
  document.getElementById(id).style.display = 'block';
  if (id === 'modalRec') {
    let opts = '';
    PRODS.forEach(p => opts += '<option value="' + p + '">');
    document.getElementById('prodList').innerHTML = opts;
    document.getElementById('recFpc').value = '';
    document.getElementById('fpcStatus').textContent = '';
  }
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// Quand le code produit change (saisie ou scan), on regarde si la référence est connue
function onProdChange() {
  const fpcInput = document.getElementById('recFpc');
  const statusEl = document.getElementById('fpcStatus');
  if (!fpcInput || !statusEl) return; // sécurité : éléments pas présents (mauvais contexte)

  const prodEl = document.getElementById('recProd');
  const prod = prodEl ? prodEl.value.trim() : '';
  const parsed = parseProductCode(prod);

  if (!parsed) {
    statusEl.textContent = '';
    return;
  }

  if (FPC_TABLE[parsed.key] !== undefined) {
    fpcInput.value = FPC_TABLE[parsed.key];
    statusEl.innerHTML = '<span style="color:#00aa44;">✓ Référence connue</span>';
  } else {
    fpcInput.value = '';
    statusEl.innerHTML = '<span style="color:#cc6600;">⚠️ Nouvelle référence — indiquez la quantité (CANTIDAD) de l\'étiquette</span>';
  }
}

// ═══════════════════════════════════════════════════════════
// ENTRÉES
// ═══════════════════════════════════════════════════════════
function renderEntrees() {
  if (DB.entrees.length === 0) {
    document.getElementById('entreeList').innerHTML = '<p style="color:#999; text-align:center; margin-top:30px;">Aucune réception enregistrée</p>';
    return;
  }
  let html = '';
  DB.entrees.slice().reverse().forEach(e => {
    html += '<div class="card">' +
            '<strong>' + e.prod + '</strong><br>' +
            'N° ' + e.num + ' · ' + e.nb + ' caisse(s) · ' + e.feuilles + ' feuilles<br>';
    if (e.emp) html += '<span style="color:#0055cc;">📍 ' + e.emp + '</span>';
    html += '</div>';
  });
  document.getElementById('entreeList').innerHTML = html;
}

function saveRec() {
  const prod = document.getElementById('recProd').value.trim();
  const nb = parseInt(document.getElementById('recNb').value) || 1;
  const num = document.getElementById('recNum').value.trim();
  const emp = document.getElementById('recEmp').value.trim();
  const fpcSaisi = parseInt(document.getElementById('recFpc').value);

  if (!prod || !num) {
    alert('Veuillez remplir le produit et le N° contenant');
    return;
  }

  if (!fpcSaisi || fpcSaisi <= 0) {
    alert('⚠️ Veuillez indiquer le nombre de feuilles par caisse (visible sur l\'étiquette : CANTIDAD)');
    return;
  }

  // ANTI-DOUBLON : vérifier si ce N° contenant est déjà en stock (reçu et pas encore sorti/cassé en totalité)
  const dejaRecu = DB.entrees.some(e => e.num === num);
  const dejaSorti = DB.sorties.some(s => s.num === num);
  if (dejaRecu && !dejaSorti) {
    alert('⛔ Ce N° de contenant (' + num + ') est déjà enregistré en stock.\nImpossible de le scanner deux fois.');
    return;
  }

  // Mémoriser cette référence (épaisseur+dimensions) pour la prochaine fois
  const parsed = parseProductCode(prod);
  if (parsed && FPC_TABLE[parsed.key] !== fpcSaisi) {
    FPC_TABLE[parsed.key] = fpcSaisi;
    saveFpcTable();
  }

  const feuilles = fpcSaisi * nb;

  DB.entrees.push({ prod, nb, num, emp, feuilles, date: new Date().toISOString() });
  logMouvement('Entrée', num, prod + ' · ' + nb + ' caisse(s) · ' + feuilles + ' feuilles' + (emp ? ' · 📍' + emp : ''));

  if (!DB.stock[prod]) DB.stock[prod] = { f: 0, c: 0 };
  DB.stock[prod].f += feuilles;
  DB.stock[prod].c += nb;

  saveDB();
  closeModal('modalRec');

  document.getElementById('recProd').value = '';
  document.getElementById('recFpc').value = '';
  document.getElementById('recNb').value = '1';
  document.getElementById('recNum').value = '';
  document.getElementById('recEmp').value = '';

  renderEntrees();
  alert('✓ Réception enregistrée : ' + feuilles + ' feuilles');
}

// ═══════════════════════════════════════════════════════════
// CASSE
// ═══════════════════════════════════════════════════════════
function renderCasse() {
  if (DB.casses.length === 0) {
    document.getElementById('casseList').innerHTML = '<p style="color:#999; text-align:center; margin-top:30px;">Aucune casse déclarée</p>';
    return;
  }
  let html = '';
  DB.casses.slice().reverse().forEach(c => {
    html += '<div class="card">' +
            '<strong style="color:#cc2222;">N° ' + c.num + '</strong><br>' +
            '-' + c.qty + ' feuilles cassées<br>' +
            '<span style="color:#888; font-size:12px;">' + new Date(c.date).toLocaleString('fr-FR') + '</span>' +
            '</div>';
  });
  document.getElementById('casseList').innerHTML = html;
}

function saveCasse() {
  const num = document.getElementById('casseNum').value.trim();
  const qty = parseInt(document.getElementById('casseQty').value) || 1;

  if (!num) {
    alert('Veuillez entrer le N° contenant');
    return;
  }

  DB.casses.push({ num, qty, date: new Date().toISOString() });
  logMouvement('Casse', num, '-' + qty + ' feuilles cassées');
  saveDB();
  closeModal('modalCasse');

  document.getElementById('casseNum').value = '';
  document.getElementById('casseQty').value = '1';

  renderCasse();
  alert('💥 Casse déclarée : -' + qty + ' feuilles');
}

// ═══════════════════════════════════════════════════════════
// SORTIES
// ═══════════════════════════════════════════════════════════
function renderSorties() {
  if (DB.sorties.length === 0) {
    document.getElementById('sortieList').innerHTML = '<p style="color:#999; text-align:center; margin-top:30px;">Aucune sortie enregistrée</p>';
    return;
  }
  let html = '';
  DB.sorties.slice().reverse().forEach(s => {
    html += '<div class="card">' +
            '<strong>' + s.prod + '</strong><br>' +
            'N° ' + s.num + ' · -' + s.feuilles + ' feuilles<br>';
    if (s.client) html += '<span style="color:#cc6600;">👤 ' + s.client + '</span><br>';
    html += '<span style="color:#888; font-size:12px;">' + new Date(s.date).toLocaleString('fr-FR') + '</span>' +
            '</div>';
  });
  document.getElementById('sortieList').innerHTML = html;
}

function saveSortie() {
  const num = document.getElementById('sortieNum').value.trim();
  const client = document.getElementById('sortieClient').value.trim();

  if (!num) {
    alert('Veuillez scanner ou entrer le N° contenant');
    return;
  }

  // Chercher l'entrée correspondante par N° contenant (la plus récente non encore sortie)
  const entry = DB.entrees.slice().reverse().find(e => e.num === num);

  if (!entry) {
    alert('⚠️ Aucune réception trouvée pour le contenant : ' + num);
    return;
  }

  const prod = entry.prod;
  const feuilles = entry.feuilles;
  const nb = entry.nb;

  if (!DB.stock[prod] || DB.stock[prod].f < feuilles) {
    alert('⚠️ Stock insuffisant pour ce produit (' + prod + ')');
    return;
  }

  // Décrémenter le stock
  DB.stock[prod].f -= feuilles;
  DB.stock[prod].c -= nb;

  DB.sorties.push({ prod, num, feuilles, nb, client, date: new Date().toISOString() });
  logMouvement('Sortie', num, prod + ' · -' + feuilles + ' feuilles' + (client ? ' · 👤' + client : ''));

  saveDB();
  closeModal('modalSortie');

  document.getElementById('sortieNum').value = '';
  document.getElementById('sortieClient').value = '';

  renderSorties();
  alert('✓ Sortie enregistrée : -' + feuilles + ' feuilles (' + prod + ')');
}

// ═══════════════════════════════════════════════════════════
// STOCK
// ═══════════════════════════════════════════════════════════
// Retourne la liste des contenants encore actifs (reçus, pas sortis, pas cassés en totalité) pour un produit donné
function getContenantsActifs(prod) {
  return DB.entrees
    .filter(e => e.prod === prod)
    .filter(e => !DB.sorties.some(s => s.num === e.num)); // exclut ceux déjà sortis
}

function renderStock() {
  let totF = 0, totC = 0;
  Object.values(DB.stock).forEach(v => { totF += v.f; totC += v.c; });

  document.getElementById('stockKpis').innerHTML =
    '<div class="kpi">' + totF + ' feuilles</div>' +
    '<div class="kpi">' + totC + ' caisses</div>';

  if (Object.keys(DB.stock).length === 0) {
    document.getElementById('stockList').innerHTML = '<p style="color:#999; text-align:center; margin-top:30px;">Aucun stock</p>';
    return;
  }

  const isGestionnaire = currentUser && currentUser.role === 'Gestionnaire';

  let html = '';
  Object.entries(DB.stock).forEach(([prod, v]) => {
    if (v.f > 0) {
      const contenants = getContenantsActifs(prod);
      html += '<div class="card"><strong>' + prod + '</strong><br>' +
              v.f + ' feuilles · ' + v.c + ' caisses';

      if (contenants.length > 0) {
        html += '<div style="margin-top:8px; padding-top:8px; border-top:1px solid #ddd;">';
        contenants.forEach(c => {
          html += '<div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:13px;">' +
                  '<span>📦 <strong>' + c.num + '</strong> · ' + c.feuilles + ' feuilles' +
                  (c.emp ? ' · 📍' + c.emp : '') + '</span>';
          if (isGestionnaire) {
            html += '<button onclick="removeContenantFromStock(\'' + prod.replace(/'/g, "\\'") + '\',\'' + c.num.replace(/'/g, "\\'") + '\')" ' +
                    'style="background:#cc2222; color:#fff; border:none; border-radius:6px; padding:6px 10px; font-size:16px; margin:0;">🗑️</button>';
          }
          html += '</div>';
        });
        html += '</div>';
      }

      if (isGestionnaire) {
        html += '<button class="btn-red" style="margin-top:8px; padding:8px; font-size:13px;" onclick="removeProductFromStock(\'' + prod.replace(/'/g, "\\'") + '\')">🗑️ Retirer TOUT le produit du stock</button>';
      }
      html += '</div>';
    }
  });
  document.getElementById('stockList').innerHTML = html || '<p style="color:#999;">Stock vide</p>';
}

// Réservé au Gestionnaire : retire UN contenant précis du stock (plus ciblé que removeProductFromStock)
function removeContenantFromStock(prod, num) {
  if (!currentUser || currentUser.role !== 'Gestionnaire') {
    alert('⛔ Action réservée au Gestionnaire.');
    return;
  }
  const entry = DB.entrees.find(e => e.prod === prod && e.num === num);
  if (!entry || !DB.stock[prod]) return;

  if (!confirm('⚠️ Retirer DÉFINITIVEMENT le contenant ' + num + ' (' + entry.feuilles + ' feuilles) du stock ?\nCette action est irréversible.')) return;

  DB.stock[prod].f -= entry.feuilles;
  DB.stock[prod].c -= entry.nb;
  if (DB.stock[prod].f <= 0) delete DB.stock[prod];

  logMouvement('Suppression', num, prod + ' · retiré du stock par le Gestionnaire');

  saveDB();
  renderStock();
  alert('✓ Contenant ' + num + ' retiré du stock.');
}

// Réservé au Gestionnaire : supprime totalement un produit du stock (sans création de sortie/vente).
function removeProductFromStock(prod) {
  if (!currentUser || currentUser.role !== 'Gestionnaire') {
    alert('⛔ Action réservée au Gestionnaire.');
    return;
  }
  if (!DB.stock[prod]) return;

  const confirmMsg = '⚠️ Retirer DÉFINITIVEMENT "' + prod + '" du stock ?\n' +
    DB.stock[prod].f + ' feuilles / ' + DB.stock[prod].c + ' caisses seront supprimées.\n' +
    'Cette action est irréversible.';
  if (!confirm(confirmMsg)) return;

  delete DB.stock[prod];

  // On loggue la suppression pour chaque contenant encore actif lié à ce produit,
  // pour que l'historique par N° contenant reste cohérent.
  getContenantsActifs(prod).forEach(c => {
    logMouvement('Suppression', c.num, prod + ' · retiré du stock par le Gestionnaire');
  });

  saveDB();
  renderStock();
  alert('✓ "' + prod + '" a été retiré du stock.');
}

// ═══════════════════════════════════════════════════════════
// HISTORIQUE DES MOUVEMENTS
// ═══════════════════════════════════════════════════════════
const MOUVEMENT_COLORS = {
  'Entrée': '#0055cc',
  'Casse': '#cc2222',
  'Sortie': '#cc6600',
  'Suppression': '#660000',
  'Transfert': '#6633aa'
};

function renderHistorique() {
  const num = document.getElementById('histNum').value.trim();
  const listEl = document.getElementById('histList');

  if (!num) {
    listEl.innerHTML = '<p style="color:#999; text-align:center; margin-top:30px;">Entrez ou scannez un N° de contenant pour voir son historique</p>';
    return;
  }

  const mouvements = DB.mouvements
    .filter(m => m.num === num)
    .slice()
    .sort((a, b) => new Date(a.date) - new Date(b.date)); // ordre chronologique

  if (mouvements.length === 0) {
    listEl.innerHTML = '<p style="color:#999; text-align:center; margin-top:30px;">Aucun mouvement trouvé pour ce N° de contenant</p>';
    return;
  }

  let html = '<p style="color:#888; font-size:13px;">' + mouvements.length + ' mouvement(s) trouvé(s) pour <strong>' + num + '</strong></p>';
  mouvements.forEach(m => {
    const color = MOUVEMENT_COLORS[m.type] || '#555';
    const d = new Date(m.date);
    const dateStr = d.toLocaleDateString('fr-FR') + ' à ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    html += '<div class="card" style="border-left:4px solid ' + color + ';">' +
            '<strong style="color:' + color + ';">' + m.type + '</strong><br>' +
            m.detail + '<br>' +
            '<span style="color:#888; font-size:12px;">👤 ' + m.operateur + ' · ' + dateStr + '</span>' +
            '</div>';
  });
  listEl.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// SCANNER CAMÉRA — BarcodeDetector (HTTPS requis)
// ═══════════════════════════════════════════════════════════
let scanStream = null;
let scanDetector = null;
let scanRunning = false;
let scanRaf = null;
let scanTargetQueue = [];
let scanFoundCodes = {}; // codes déjà capturés dans cette session { code: true }
let scanCooldownUntil = 0;
let scanRejectUntil = 0;
let scanWatchdogTimer = null;
let scanLastTickAt = 0;

const FIELD_LABELS = {
  recProd: 'PRODUIT',
  recNum: 'N° CONTENANT',
  casseNum: 'N° contenant',
  sortieNum: 'N° contenant',
  histNum: 'N° contenant'
};

// Règles strictes de validation selon le champ ciblé
// Produit ex: FL8-321/214  → lettres + chiffres + tiret + slash
// Contenant ex: 22325100518C → exactement 11 chiffres + 1 lettre majuscule
const FIELD_VALIDATORS = {
  recProd:   { regex: /^[A-Z]{1,6}\d{1,3}[A-Z]{0,4}-\d{2,4}\/\d{2,4}$/, msg: 'Format produit attendu : FL8-321/214 ou FL4GR-330/225 ou CG4-250/200' },
  recNum:    { regex: /^\d{11}[A-Z]$/, msg: 'Format contenant attendu : 11 chiffres + 1 lettre (ex: 22325100518C)' },
  casseNum:  { regex: /^\d{11}[A-Z]$/, msg: 'Format contenant attendu : 11 chiffres + 1 lettre (ex: 22325100518C)' },
  sortieNum: { regex: /^\d{11}[A-Z]$/, msg: 'Format contenant attendu : 11 chiffres + 1 lettre (ex: 22325100518C)' },
  histNum:   { regex: /^\d{11}[A-Z]$/, msg: 'Format contenant attendu : 11 chiffres + 1 lettre (ex: 22325100518C)' }
};

function openScanner(targetFieldId) {
  scanTargetQueue = Array.isArray(targetFieldId) ? targetFieldId.slice() : [targetFieldId];
  scanFoundCodes = {};
  scanCooldownUntil = 0;
  scanRejectUntil = 0;
  document.getElementById('modalScanner').style.display = 'block';
  document.getElementById('scanManualInp').value = '';
  updateScanStatus();
  startCamera();
  startWatchdog();
}

// Garde-fou : si la boucle de détection ne "tique" plus depuis 3s alors qu'elle devrait,
// on la relance de force. Filet de sécurité ultime contre tout blocage imprévu.
function startWatchdog() {
  stopWatchdog();
  scanLastTickAt = Date.now();
  scanWatchdogTimer = setInterval(() => {
    const modalVisible = document.getElementById('modalScanner').style.display === 'block';
    if (!modalVisible) { stopWatchdog(); return; }
    if (scanRunning && Date.now() - scanLastTickAt > 3000) {
      console.warn('Watchdog: boucle figée, relance forcée');
      detectLoop();
    }
  }, 1000);
}

function stopWatchdog() {
  if (scanWatchdogTimer) { clearInterval(scanWatchdogTimer); scanWatchdogTimer = null; }
}

function updateScanStatus(extra) {
  const statusEl = document.getElementById('scanStatusMsg');
  const next = scanTargetQueue[0];
  let html = '📷 Visez le code-barres <strong>' + (FIELD_LABELS[next] || 'demandé') + '</strong>';
  if (extra) html = extra + '<br>' + html;
  statusEl.innerHTML = html;
}

async function startCamera() {
  const video = document.getElementById('scanVideo');
  const statusEl = document.getElementById('scanStatusMsg');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 }, focusMode: 'continuous' }
    });
    scanStream = stream;
    video.srcObject = stream;
    await video.play();

    if ('BarcodeDetector' in window) {
      // Uniquement Code 128 et Code 39 (formats réellement utilisés sur ces étiquettes).
      // EAN-13, QR, Data Matrix, etc. sont volontairement exclus pour éviter les faux positifs.
      scanDetector = new BarcodeDetector({
        formats: ['code_128', 'code_39']
      });
      updateScanStatus();
      scanRunning = true;
      detectLoop();
    } else {
      statusEl.textContent = '⚠️ Scanner automatique non supporté sur ce navigateur. Tapez le code ci-dessous.';
    }
  } catch (err) {
    let msg = 'Erreur caméra : ' + err.message;
    if (err.name === 'NotAllowedError') msg = '❌ Permission caméra refusée. Autorisez dans les réglages du navigateur.';
    statusEl.textContent = msg;
  }
}

function detectLoop() {
  const video = document.getElementById('scanVideo');
  const canvas = document.getElementById('scanCanvas');

  const tick = async () => {
    scanLastTickAt = Date.now();
    if (!scanRunning) return;
    if (!video.videoWidth) { scanRaf = requestAnimationFrame(tick); return; }

    if (Date.now() < scanRejectUntil) {
      scanRaf = requestAnimationFrame(tick);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    let detectedCodes = [];
    try {
      const codes = await scanDetector.detect(canvas);
      detectedCodes = codes.map(c => c.rawValue.trim());
    } catch(e) { /* erreur de détection caméra : on ignore, on continue la boucle */ }

    if (detectedCodes.length > 0) {
      try {
        handleCodesFound(detectedCodes);
      } catch(e) {
        console.error('Erreur handleCodesFound:', e);
      }
    }
    scanRaf = requestAnimationFrame(tick);
  };
  scanRaf = requestAnimationFrame(tick);
}

// Traite TOUS les codes visibles dans la frame en une fois (pas seulement un par un).
// Cela évite le problème où 2 codes sont visibles simultanément à l'écran mais le
// detector ne "voit" toujours que le même, bloquant la progression vers le 2e champ.
function handleCodesFound(codes) {
  // Essaie d'assigner chaque champ encore en attente à un code qui correspond à sa regex
  // et qui n'a pas déjà été utilisé dans cette session.
  for (let i = scanTargetQueue.length - 1; i >= 0; i--) {
    const field = scanTargetQueue[i];
    if (field !== scanTargetQueue[0]) continue; // on ne traite que le champ courant en tête de file, dans l'ordre
    const validator = FIELD_VALIDATORS[field];

    // Cherche parmi les codes visibles celui qui correspond à ce champ et n'a pas déjà été pris
    const match = codes.find(code => !scanFoundCodes[code] && (!validator || validator.regex.test(code)));

    if (match) {
      acceptCode(field, match);
      return; // on retraite à la prochaine frame pour le champ suivant
    }
  }

  // Aucun code valide trouvé pour le champ courant : si un code a été vu mais ne correspond
  // à aucune règle attendue, on peut signaler un rejet (seulement si un seul nouveau code visible)
  const field = scanTargetQueue[0];
  const validator = FIELD_VALIDATORS[field];
  const unseenCodes = codes.filter(c => !scanFoundCodes[c]);
  if (unseenCodes.length > 0 && validator) {
    const rejectedCode = unseenCodes[0];
    if (Date.now() >= scanRejectUntil) {
      if (navigator.vibrate) navigator.vibrate(150);
      document.getElementById('scanStatusMsg').innerHTML =
        '⛔ Code non reconnu pour ce champ : "' + rejectedCode + '"<br>' + validator.msg;
      scanRejectUntil = Date.now() + 1200;
    }
  }
}

function acceptCode(field, code) {
  scanFoundCodes[code] = true;
  if (navigator.vibrate) navigator.vibrate([100,50,100]);
  scanTargetQueue.shift();
  document.getElementById(field).value = code;
  if (field === 'recProd') onProdChange();
  if (field === 'histNum') renderHistorique();

  if (scanTargetQueue.length > 0) {
    updateScanStatus('✅ <strong>' + (FIELD_LABELS[field] || '') + '</strong> = ' + code);
  } else {
    document.getElementById('scanStatusMsg').innerHTML = '✅ <strong>' + (FIELD_LABELS[field] || '') + '</strong> = ' + code + '<br>Terminé !';
    scanRunning = false;
    setTimeout(() => { closeScanner(); }, 700);
  }
}

function stopCamera() {
  scanRunning = false;
  if (scanRaf) cancelAnimationFrame(scanRaf);
  if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
    scanStream = null;
  }
  scanDetector = null;
}

function closeScanner() {
  stopCamera();
  stopWatchdog();
  document.getElementById('modalScanner').style.display = 'none';
}

function validateManualScan() {
  const val = document.getElementById('scanManualInp').value.trim();
  if (!val) return;
  scanRunning = false;
  handleCodeFound(val);
}


// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderUserList();
</script>
